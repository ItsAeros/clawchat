version: '3.8'
services:
  clawchat:
    image: nginx:alpine
    container_name: clawchat
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:80"
    networks:
      - default
      - openclaw
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  openclaw:
    external: true
    name: openclaw_default
