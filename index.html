<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClawChat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e10;
  --surface: #18181b;
  --surface2: #202024;
  --border: #2a2a2f;
  --border2: #3a3a42;
  --text: #e8e8ed;
  --text2: #9090a0;
  --text3: #5a5a6a;
  --accent: #7c6fff;
  --accent-dim: rgba(124,111,255,0.15);
  --accent-hover: #9585ff;
  --user-bg: #2563eb;
  --user-bg-dim: rgba(37,99,235,0.15);
  --green: #22c55e;
  --red: #ef4444;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  overflow: hidden;
}

/* ── Setup screen ── */
#setup {
  display: none;
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
#setup.visible { display: flex; }

.setup-card {
  width: min(420px, 92vw);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px 32px;
  box-shadow: var(--shadow);
}
.setup-logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px;
}
.setup-logo svg { flex-shrink: 0; }
.setup-logo-text h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.setup-logo-text p { font-size: 13px; color: var(--text2); margin-top: 2px; }
.setup-field { margin-bottom: 16px; }
.setup-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
.setup-field input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font: inherit; padding: 10px 12px; outline: none;
  transition: border-color var(--transition);
}
.setup-field input:focus { border-color: var(--accent); }
.setup-field input::placeholder { color: var(--text3); }
.setup-btn {
  width: 100%; background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-sm); font: inherit; font-weight: 600; font-size: 14px;
  padding: 11px; cursor: pointer; margin-top: 8px;
  transition: background var(--transition), transform var(--transition);
}
.setup-btn:hover { background: var(--accent-hover); }
.setup-btn:active { transform: translateY(1px); }
.setup-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }
.setup-error.visible { display: block; }

/* ── App shell ── */
#app { display: none; flex-direction: column; height: 100vh; }
#app.visible { display: flex; }

/* ── Top bar ── */
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
.topbar-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; letter-spacing: -0.2px; }
.conn-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text3); flex-shrink: 0;
  transition: background var(--transition);
}
.conn-dot.connected { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
.conn-dot.error { background: var(--red); }
.conn-status { font-size: 12px; color: var(--text2); }
.topbar-spacer { flex: 1; }
.topbar-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text2); font: inherit; font-size: 12px;
  padding: 6px 10px; cursor: pointer;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}
.topbar-btn:hover { background: var(--border); color: var(--text); border-color: var(--border2); }
.topbar-btn svg { flex-shrink: 0; }

/* ── Grid area ── */
.grid-wrap {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 20px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.grid-wrap::-webkit-scrollbar { width: 6px; }
.grid-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(380px, 100%), 1fr));
  gap: 16px;
  align-items: start;
}

/* ── Channel card ── */
.channel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  height: 440px;
  overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition);
  position: relative;
}
.channel-card:hover { border-color: var(--border2); }
.channel-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow); }

/* channel header */
.ch-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px 11px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.ch-avatar {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0;
  letter-spacing: -0.3px;
}
.ch-info { flex: 1; min-width: 0; }
.ch-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-model { font-size: 11px; color: var(--text3); margin-top: 1px; }
.ch-status { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.ch-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.ch-dot.typing { background: var(--green); animation: pulse 1.2s ease-in-out infinite; }
.ch-actions { display: flex; gap: 4px; }
.ch-btn {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer; color: var(--text3);
  transition: background var(--transition), color var(--transition);
}
.ch-btn:hover { background: var(--border); color: var(--text2); }
.ch-btn:hover.danger { background: rgba(239,68,68,0.15); color: var(--red); }

/* messages */
.ch-messages {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 4px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.ch-messages::-webkit-scrollbar { width: 4px; }
.ch-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; flex-direction: column; max-width: 85%; animation: msgIn 0.15s ease-out; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.assistant { align-self: flex-start; align-items: flex-start; }
.msg-role { font-size: 10px; font-weight: 600; color: var(--text3); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
.msg-bubble {
  padding: 8px 11px; border-radius: 10px;
  font-size: 13px; line-height: 1.55; word-break: break-word;
  white-space: pre-wrap;
}
.msg.user .msg-bubble {
  background: var(--user-bg); color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.assistant .msg-bubble {
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg-time { font-size: 10px; color: var(--text3); margin-top: 3px; }

/* streaming indicator */
.stream-msg { align-self: flex-start; align-items: flex-start; display: flex; flex-direction: column; max-width: 85%; }
.stream-bubble {
  background: var(--surface2); border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  padding: 8px 11px; border-radius: 10px;
  font-size: 13px; line-height: 1.55; word-break: break-word; white-space: pre-wrap;
  color: var(--text);
}
.stream-bubble::after {
  content: '▋';
  color: var(--accent);
  animation: blink 0.8s step-end infinite;
  margin-left: 1px;
}
.stream-bubble.has-text::after { display: inline; }

/* empty state */
.ch-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; color: var(--text3); font-size: 12px;
  padding: 20px;
  text-align: center;
}
.ch-empty svg { opacity: 0.3; }
.ch-empty strong { color: var(--text2); font-size: 13px; }

/* input bar */
.ch-input-bar {
  padding: 10px 12px 11px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
  flex-shrink: 0;
}
.ch-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font: inherit; font-size: 13px;
  padding: 8px 10px; outline: none; resize: none; max-height: 100px;
  min-height: 36px; overflow-y: auto;
  transition: border-color var(--transition);
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  line-height: 1.45;
}
.ch-input:focus { border-color: var(--accent); }
.ch-input::placeholder { color: var(--text3); }
.ch-send {
  width: 32px; height: 32px; border-radius: 7px;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0;
  transition: background var(--transition), transform var(--transition), opacity var(--transition);
  align-self: flex-end;
}
.ch-send:hover { background: var(--accent-hover); }
.ch-send:active { transform: scale(0.92); }
.ch-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── Expanded overlay ── */
#expanded-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  animation: fadeIn 0.18s ease-out;
  padding: 24px;
  align-items: center; justify-content: center;
}
#expanded-overlay.visible { display: flex; }

.expanded-card {
  width: 100%; max-width: 860px; height: calc(100vh - 48px);
  max-height: 900px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  overflow: hidden;
  animation: scaleIn 0.18s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── Add channel modal ── */
#add-modal {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#add-modal.visible { display: flex; }

.modal-card {
  width: min(480px, 90vw);
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 28px;
  box-shadow: var(--shadow);
  animation: scaleIn 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
.agent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}
.agent-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 11px; border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  cursor: pointer; background: var(--surface2);
  transition: background var(--transition), border-color var(--transition);
  font-size: 13px;
}
.agent-item:hover { background: var(--border); border-color: var(--border2); }
.agent-item.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.agent-item .badge { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn {
  padding: 8px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); font: inherit; font-size: 13px;
  cursor: pointer; transition: background var(--transition), color var(--transition);
}
.modal-btn:hover { background: var(--border); color: var(--text); }
.modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-btn.primary:hover { background: var(--accent-hover); }

/* ── Animations ── */
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
@keyframes msgIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.94); } to { opacity:1; transform:none; } }

/* ── Markdown-ish text rendering in bubbles ── */
.msg-bubble code {
  background: rgba(0,0,0,0.25); border-radius: 4px;
  padding: 1px 5px; font-family: ui-monospace, "Cascadia Code", monospace; font-size: 12px;
}
.msg.user .msg-bubble code { background: rgba(0,0,0,0.3); }
.msg-bubble pre {
  background: rgba(0,0,0,0.35); border-radius: 6px;
  padding: 8px 10px; margin: 6px 0; overflow-x: auto;
  font-family: ui-monospace, "Cascadia Code", monospace; font-size: 12px;
  white-space: pre; word-break: normal; scrollbar-width: thin;
}

/* scrollbar on pre */
.msg-bubble pre::-webkit-scrollbar { height: 4px; }
.msg-bubble pre::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Disconnect notice */
.disconn-banner {
  background: rgba(239,68,68,0.1); border-top: 1px solid rgba(239,68,68,0.3);
  color: var(--red); font-size: 12px; text-align: center;
  padding: 6px; flex-shrink: 0; display: none;
}
.disconn-banner.visible { display: block; }

/* Clear history button style */
.clear-link { font-size: 11px; color: var(--text3); cursor: pointer; text-decoration: underline; padding: 2px 4px; border-radius: 4px; transition: color var(--transition); display: inline-block; }
.clear-link:hover { color: var(--text2); }
</style>
</head>
<body>

<!-- Setup screen -->
<div id="setup">
  <div class="setup-card">
    <div class="setup-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="#7c6fff"/>
        <path d="M10 24L18 10L26 24M14 20H22" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="setup-logo-text">
        <h1>ClawChat</h1>
        <p>OpenClaw agent grid</p>
      </div>
    </div>
    <div class="setup-field">
      <label>Token</label>
      <input id="setup-token" type="password" placeholder="Gateway auth token" autocomplete="off" spellcheck="false">
    </div>
    <button class="setup-btn" id="setup-connect">Connect</button>
    <div class="setup-error" id="setup-error"></div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <svg width="22" height="22" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="#7c6fff"/>
        <path d="M10 24L18 10L26 24M14 20H22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ClawChat
    </div>
    <div class="conn-dot" id="conn-dot"></div>
    <span class="conn-status" id="conn-status">Connecting…</span>
    <div class="topbar-spacer"></div>
    <button class="topbar-btn" id="btn-add-channel">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Add channel
    </button>
    <button class="topbar-btn" id="btn-settings" title="Settings">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M2.93 11.07l1.06-1.06M10.01 3.99l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div class="disconn-banner" id="disconn-banner">Connection lost. Reconnecting…</div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- Expanded overlay -->
<div id="expanded-overlay">
  <div class="expanded-card" id="expanded-card"></div>
</div>

<!-- Add channel modal -->
<div id="add-modal">
  <div class="modal-card">
    <div class="modal-title">Add channels</div>
    <div class="agent-grid" id="agent-grid"></div>
    <div class="modal-footer">
      <button class="modal-btn" id="modal-cancel">Cancel</button>
      <button class="modal-btn primary" id="modal-add">Add selected</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────
const STORAGE_KEY = 'clawchat.v1';
const GATEWAY_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/gateway`;

const AGENTS = [
  { id: 'main',             name: 'Main',             color: '#7c6fff', abbr: 'MA' },
  { id: 'researcher',       name: 'Researcher',       color: '#2563eb', abbr: 'RE' },
  { id: 'code-researcher',  name: 'Code Researcher',  color: '#0891b2', abbr: 'CR' },
  { id: 'archivist',        name: 'Archivist',        color: '#7c3aed', abbr: 'AR' },
  { id: 'summarizer',       name: 'Summarizer',       color: '#0d9488', abbr: 'SU' },
  { id: 'security-scanner', name: 'Security Scanner', color: '#dc2626', abbr: 'SS' },
  { id: 'photo-editor',     name: 'Photo Editor',     color: '#d97706', abbr: 'PE' },
  { id: 'excalidraw',       name: 'Excalidraw',       color: '#db2777', abbr: 'EX' },
  { id: 'tester',           name: 'Tester',           color: '#16a34a', abbr: 'TE' },
  { id: 'coder',            name: 'Coder',            color: '#ea580c', abbr: 'CO' },
];

const agentMap = Object.fromEntries(AGENTS.map(a => [a.id, a]));

function sessionKey(agentId) {
  return agentId === 'main' ? 'main' : `agent:${agentId}:main`;
}

// ── State ────────────────────────────────────────────────
let ws = null;
let wsConnected = false;
let reconnectTimer = null;
let pendingRequests = new Map();
let channels = []; // [{agentId, messages:[], streaming:null, runId:null}]
let expandedId = null;
let selectedAgents = new Set();

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    return {
      token: s.token || '',
      channelIds: s.channelIds || [],
    };
  } catch { return { token: '', channelIds: [] }; }
}

function saveState() {
  const s = loadState();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    token: s.token,
    channelIds: channels.map(c => c.agentId),
  }));
}

function saveCredentials(token) {
  const s = loadState();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...s, token }));
}

// ── WebSocket ────────────────────────────────────────────
function wsRequest(method, params) {
  const id = crypto.randomUUID();
  return new Promise((resolve, reject) => {
    pendingRequests.set(id, { resolve, reject });
    ws.send(JSON.stringify({ type: 'req', id, method, params }));
    setTimeout(() => {
      if (pendingRequests.has(id)) {
        pendingRequests.delete(id);
        reject(new Error('Request timed out'));
      }
    }, 30000);
  });
}

function handleGatewayEvent(event, payload) {
  if (event === 'chat') {
    const sk = payload?.sessionKey;
    if (!sk) return;
    const ch = channels.find(c => sessionKey(c.agentId) === sk);
    if (!ch) return;

    if (payload.state === 'delta') {
      const text = extractDeltaText(payload.message);
      if (typeof text === 'string') {
        ch.streaming = text;
        ch.runId = payload.runId || ch.runId;
        renderChannel(ch.agentId);
      }
    } else if (payload.state === 'final') {
      const msg = extractFinalMessage(payload.message);
      if (msg) ch.messages.push(msg);
      ch.streaming = null;
      ch.runId = null;
      renderChannel(ch.agentId);
    } else if (payload.state === 'error' || payload.state === 'aborted') {
      ch.streaming = null;
      ch.runId = null;
      renderChannel(ch.agentId);
    }
  }
}

function extractDeltaText(msg) {
  if (!msg) return null;
  if (typeof msg.content === 'string') return msg.content;
  if (Array.isArray(msg.content)) {
    const parts = msg.content
      .filter(p => p && p.type === 'text' && typeof p.text === 'string')
      .map(p => p.text);
    return parts.join('') || null;
  }
  return null;
}

function extractFinalMessage(msg) {
  if (!msg) return null;
  const text = extractDeltaText(msg);
  return {
    role: msg.role || 'assistant',
    text: text || '',
    timestamp: msg.timestamp || Date.now(),
  };
}

async function connectWs() {
  const { token } = loadState();
  if (!token) { showSetup(); return; }
  const url = GATEWAY_URL;

  clearTimeout(reconnectTimer);
  if (ws) { ws.onclose = null; ws.close(); ws = null; }

  setConnStatus('connecting');

  ws = new WebSocket(url);

  ws.onopen = () => {};

  ws.onmessage = async (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === 'event') {
      if (msg.event === 'connect.challenge') {
        try {
          const res = await wsRequest('connect', {
            minProtocol: 3, maxProtocol: 3,
            client: {
              id: 'openclaw-control-ui',
              version: '1.0',
              platform: 'web',
              mode: 'webchat',
              instanceId: crypto.randomUUID(),
            },
            role: 'operator',
            scopes: ['operator.admin'],
            caps: [],
            auth: { token },
            userAgent: navigator.userAgent,
            locale: navigator.language,
          });
          onConnected(res);
        } catch(err) {
          setConnStatus('error', err.message);
          scheduleReconnect();
        }
        return;
      }
      const seq = typeof msg.seq === 'number' ? msg.seq : null;
      handleGatewayEvent(msg.event, msg.payload);
      return;
    }

    if (msg.type === 'res') {
      const p = pendingRequests.get(msg.id);
      if (p) {
        pendingRequests.delete(msg.id);
        if (msg.ok) p.resolve(msg.payload);
        else p.reject(new Error(msg.error?.message || 'Request failed'));
      }
    }
  };

  ws.onerror = () => {};

  ws.onclose = (e) => {
    wsConnected = false;
    ws = null;
    pendingRequests.forEach(p => p.reject(new Error('Connection closed')));
    pendingRequests.clear();
    setConnStatus('error', 'Disconnected');
    document.getElementById('disconn-banner').classList.add('visible');
    scheduleReconnect();
  };
}

function scheduleReconnect() {
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => connectWs(), 3000);
}

function onConnected(helloPayload) {
  wsConnected = true;
  setConnStatus('connected');
  document.getElementById('disconn-banner').classList.remove('visible');
  // Load history for all channels
  channels.forEach(ch => loadHistory(ch.agentId));
}

async function loadHistory(agentId) {
  if (!wsConnected) return;
  try {
    const sk = sessionKey(agentId);
    const res = await wsRequest('chat.history', { sessionKey: sk, limit: 50 });
    const ch = channels.find(c => c.agentId === agentId);
    if (!ch) return;
    if (Array.isArray(res?.messages)) {
      ch.messages = res.messages.map(m => ({
        role: m.role,
        text: extractDeltaText(m) || '',
        timestamp: m.timestamp || Date.now(),
      })).filter(m => m.text);
    }
    renderChannel(agentId);
  } catch {}
}

async function sendMessage(agentId, text) {
  if (!wsConnected || !text.trim()) return;
  const ch = channels.find(c => c.agentId === agentId);
  if (!ch || ch.streaming !== null) return;

  const sk = sessionKey(agentId);
  const ikey = crypto.randomUUID();

  ch.messages.push({ role: 'user', text: text.trim(), timestamp: Date.now() });
  ch.streaming = '';
  renderChannel(agentId);

  try {
    await wsRequest('chat.send', {
      sessionKey: sk,
      message: text.trim(),
      idempotencyKey: ikey,
    });
  } catch(err) {
    ch.streaming = null;
    renderChannel(agentId);
  }
}

async function abortMessage(agentId) {
  if (!wsConnected) return;
  const ch = channels.find(c => c.agentId === agentId);
  if (!ch) return;
  const sk = sessionKey(agentId);
  try {
    await wsRequest('chat.abort', { sessionKey: sk, ...(ch.runId ? { runId: ch.runId } : {}) });
  } catch {}
  ch.streaming = null;
  ch.runId = null;
  renderChannel(agentId);
}

// ── UI helpers ───────────────────────────────────────────
function setConnStatus(state, msg) {
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-status');
  dot.className = 'conn-dot';
  if (state === 'connected') {
    dot.classList.add('connected');
    label.textContent = 'Connected';
  } else if (state === 'error') {
    dot.classList.add('error');
    label.textContent = msg ? `Error: ${msg}` : 'Disconnected';
  } else {
    label.textContent = 'Connecting…';
  }
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  // Basic markdown: code blocks, inline code, bold
  let s = escapeHtml(text);
  // fenced code blocks
  s = s.replace(/```([^`]*?)```/gs, (_, code) =>
    `<pre>${code}</pre>`);
  // inline code
  s = s.replace(/`([^`]+)`/g, (_, code) => `<code>${code}</code>`);
  // bold
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return s;
}

// ── Channel rendering ────────────────────────────────────
function buildChannelHTML(ch, isExpanded) {
  const agent = agentMap[ch.agentId] || { name: ch.agentId, color: '#555', abbr: '??' };
  const isTyping = ch.streaming !== null;
  const hasContent = ch.messages.length > 0 || isTyping;

  const msgs = ch.messages.map(m => {
    const isUser = m.role === 'user';
    return `<div class="msg ${isUser ? 'user' : 'assistant'}">
      <div class="msg-role">${isUser ? 'You' : agent.name}</div>
      <div class="msg-bubble">${renderMarkdown(m.text)}</div>
      <div class="msg-time">${formatTime(m.timestamp)}</div>
    </div>`;
  }).join('');

  const streamEl = isTyping ? `
    <div class="stream-msg">
      <div class="msg-role">${agent.name}</div>
      <div class="stream-bubble${ch.streaming ? ' has-text' : ''}">${renderMarkdown(ch.streaming || '')}</div>
    </div>` : '';

  const emptyEl = !hasContent ? `
    <div class="ch-empty">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <strong>${agent.name}</strong>
      <span>Start a conversation</span>
    </div>` : '';

  const expandBtn = !isExpanded ? `
    <button class="ch-btn" data-action="expand" data-id="${ch.agentId}" title="Expand">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 1h4v4M5 13H1V9M13 1L8 6M1 13l5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>` : `
    <button class="ch-btn" data-action="collapse" title="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 5V1h4M9 13v-4h4M1 1l5 5M8 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>`;

  const abortBtn = isTyping ? `
    <button class="ch-btn" data-action="abort" data-id="${ch.agentId}" title="Stop">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="2" width="8" height="8" rx="1.5" fill="currentColor"/></svg>
    </button>` : '';

  const removeBtn = !isExpanded ? `
    <button class="ch-btn danger" data-action="remove" data-id="${ch.agentId}" title="Remove channel">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
    </button>` : '';

  return `
    <div class="ch-header">
      <div class="ch-avatar" style="background:${agent.color}">${agent.abbr}</div>
      <div class="ch-info">
        <div class="ch-name">${agent.name}</div>
        <div class="ch-model">agent:${ch.agentId}</div>
      </div>
      <div class="ch-status">
        <div class="ch-dot${isTyping ? ' typing' : ''}"></div>
      </div>
      <div class="ch-actions">
        ${abortBtn}
        ${expandBtn}
        ${removeBtn}
      </div>
    </div>
    <div class="ch-messages" data-agent="${ch.agentId}">
      ${emptyEl}
      ${msgs}
      ${streamEl}
    </div>
    <div class="ch-input-bar">
      <textarea
        class="ch-input"
        data-agent="${ch.agentId}"
        placeholder="Message ${agent.name}…"
        rows="1"
        ${isTyping ? 'disabled' : ''}
      ></textarea>
      <button class="ch-send" data-agent="${ch.agentId}" ${isTyping ? 'disabled' : ''} title="Send">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M13 1L1 6l5 2.5M13 1L8 13l-2-4.5M13 1L6 8.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>`;
}

function renderChannel(agentId) {
  const ch = channels.find(c => c.agentId === agentId);
  if (!ch) return;

  // Update grid card
  const card = document.querySelector(`.channel-card[data-agent="${agentId}"]`);
  if (card) {
    const wasAtBottom = isScrolledToBottom(card.querySelector('.ch-messages'));
    card.innerHTML = buildChannelHTML(ch, false);
    if (wasAtBottom) scrollToBottom(card.querySelector('.ch-messages'));
    bindCardEvents(card, false);
  }

  // Update expanded if open
  if (expandedId === agentId) {
    const expCard = document.getElementById('expanded-card');
    const wasAtBottom = isScrolledToBottom(expCard.querySelector('.ch-messages'));
    expCard.innerHTML = buildChannelHTML(ch, true);
    if (wasAtBottom) scrollToBottom(expCard.querySelector('.ch-messages'));
    bindCardEvents(expCard, true);
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  channels.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'channel-card';
    card.dataset.agent = ch.agentId;
    card.innerHTML = buildChannelHTML(ch, false);
    grid.appendChild(card);
    scrollToBottom(card.querySelector('.ch-messages'));
    bindCardEvents(card, false);
  });
}

function bindCardEvents(container, isExpanded) {
  // Textarea auto-resize + send on Enter
  container.querySelectorAll('.ch-input').forEach(ta => {
    const agentId = ta.dataset.agent;
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
    });
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const text = ta.value;
        ta.value = '';
        ta.style.height = 'auto';
        sendMessage(agentId, text);
      }
    });
  });

  // Send button
  container.querySelectorAll('.ch-send').forEach(btn => {
    btn.addEventListener('click', () => {
      const agentId = btn.dataset.agent;
      const ta = container.querySelector(`.ch-input[data-agent="${agentId}"]`);
      if (ta) {
        const text = ta.value;
        ta.value = '';
        ta.style.height = 'auto';
        sendMessage(agentId, text);
      }
    });
  });

  // Action buttons
  container.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      if (action === 'expand') expandChannel(id);
      else if (action === 'collapse') collapseChannel();
      else if (action === 'remove') removeChannel(id);
      else if (action === 'abort') abortMessage(id);
    });
  });
}

function isScrolledToBottom(el) {
  if (!el) return true;
  return el.scrollHeight - el.scrollTop - el.clientHeight < 40;
}

function scrollToBottom(el) {
  if (!el) return;
  el.scrollTop = el.scrollHeight;
}

// ── Channel management ───────────────────────────────────
function addChannel(agentId) {
  if (channels.find(c => c.agentId === agentId)) return;
  channels.push({ agentId, messages: [], streaming: null, runId: null });
  saveState();
  renderGrid();
  if (wsConnected) loadHistory(agentId);
}

function removeChannel(agentId) {
  channels = channels.filter(c => c.agentId !== agentId);
  if (expandedId === agentId) collapseChannel();
  saveState();
  renderGrid();
}

function expandChannel(agentId) {
  expandedId = agentId;
  const ch = channels.find(c => c.agentId === agentId);
  if (!ch) return;
  const overlay = document.getElementById('expanded-overlay');
  const card = document.getElementById('expanded-card');
  card.innerHTML = buildChannelHTML(ch, true);
  overlay.classList.add('visible');
  scrollToBottom(card.querySelector('.ch-messages'));
  bindCardEvents(card, true);
  // Focus input
  setTimeout(() => card.querySelector('.ch-input')?.focus(), 50);
}

function collapseChannel() {
  expandedId = null;
  document.getElementById('expanded-overlay').classList.remove('visible');
}

// ── Setup / connect flow ─────────────────────────────────
function showSetup() {
  document.getElementById('app').classList.remove('visible');
  document.getElementById('setup').classList.add('visible');
  const { token } = loadState();
  document.getElementById('setup-token').value = token;
}

function showApp() {
  document.getElementById('setup').classList.remove('visible');
  document.getElementById('app').classList.add('visible');
}

// ── Add modal ─────────────────────────────────────────────
function openAddModal() {
  const grid = document.getElementById('agent-grid');
  selectedAgents.clear();
  grid.innerHTML = AGENTS.map(a => {
    const active = channels.find(c => c.agentId === a.id);
    return `<div class="agent-item${active ? ' selected' : ''}" data-agent="${a.id}">
      <div class="badge" style="background:${a.color}">${a.abbr}</div>
      <span>${a.name}</span>
    </div>`;
  }).join('');

  // Pre-select active ones
  channels.forEach(c => selectedAgents.add(c.agentId));

  grid.querySelectorAll('.agent-item').forEach(item => {
    item.addEventListener('click', () => {
      const id = item.dataset.agent;
      if (selectedAgents.has(id)) {
        selectedAgents.delete(id);
        item.classList.remove('selected');
      } else {
        selectedAgents.add(id);
        item.classList.add('selected');
      }
    });
  });

  document.getElementById('add-modal').classList.add('visible');
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('visible');
}

function applyModalSelection() {
  const toAdd = [...selectedAgents].filter(id => !channels.find(c => c.agentId === id));
  const toRemove = channels.filter(c => !selectedAgents.has(c.agentId)).map(c => c.agentId);

  toRemove.forEach(id => { channels = channels.filter(c => c.agentId !== id); });
  toAdd.forEach(id => channels.push({ agentId: id, messages: [], streaming: null, runId: null }));

  saveState();
  renderGrid();
  if (wsConnected) toAdd.forEach(id => loadHistory(id));
  closeAddModal();
}

// ── Boot ──────────────────────────────────────────────────
function boot() {
  const { token, channelIds } = loadState();
  // Migrate old localStorage that stored url separately
  const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if (raw.url !== undefined) { delete raw.url; localStorage.setItem(STORAGE_KEY, JSON.stringify(raw)); }

  // Restore channels
  const validIds = channelIds.filter(id => agentMap[id]);
  if (validIds.length === 0) {
    // Default channels
    ['main', 'researcher', 'coder'].forEach(id => {
      channels.push({ agentId: id, messages: [], streaming: null, runId: null });
    });
  } else {
    validIds.forEach(id => channels.push({ agentId: id, messages: [], streaming: null, runId: null }));
  }

  if (!token) {
    showSetup();
    return;
  }

  showApp();
  renderGrid();
  connectWs();
}

// ── Event wiring ──────────────────────────────────────────
document.getElementById('setup-connect').addEventListener('click', async () => {
  const token = document.getElementById('setup-token').value.trim();
  const errEl = document.getElementById('setup-error');
  errEl.classList.remove('visible');

  if (!token) {
    errEl.textContent = 'Token is required.';
    errEl.classList.add('visible');
    return;
  }

  saveCredentials(token);
  showApp();
  renderGrid();
  connectWs();
});

document.getElementById('setup-token').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('setup-connect').click();
});

document.getElementById('btn-settings').addEventListener('click', () => showSetup());

document.getElementById('btn-add-channel').addEventListener('click', () => openAddModal());

document.getElementById('modal-cancel').addEventListener('click', () => closeAddModal());
document.getElementById('modal-add').addEventListener('click', () => applyModalSelection());

document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAddModal();
});

document.getElementById('expanded-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) collapseChannel();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (expandedId) collapseChannel();
    else if (document.getElementById('add-modal').classList.contains('visible')) closeAddModal();
  }
});

boot();
</script>
